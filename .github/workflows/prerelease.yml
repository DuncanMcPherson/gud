name: Prerelease

on:
  push:
    branches:
      - dev
    
jobs:
  changes:
    name: Calculate Changes
    runs-on: ubuntu-latest
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
      server: ${{ steps.filter.outputs.server }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Calculate changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            core: &core
              - 'gud.Core/**'
            cli:
              - *core
              - 'gud/**'
            server:
              - *core
              - 'gud.Server/**'
  version:
    name: Generate Pre-release Version
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.cli == 'true' }}
    outputs:
      version: ${{ steps.semantic.outputs.new_release_version }}
      tag: ${{ steps.semantic.outputs.new_release_git_tag }}
      notes: ${{ steps.semantic.outputs.new_release_notes }}
      released: ${{ steps.semantic.outputs.new_release_published }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Install Dependencies
        run: npm ci
      - name: Generate version
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 24
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  build:
    name: Build and Release
    needs: version
    runs-on: ubuntu-latest
    if: ${{ needs.version.outputs.released == 'true' }}
    strategy:
      matrix:
        rid: [win-x64, linux-x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        name: Setup .NET
        with:
          dotnet-version: 10.0.x
          cache: 'true'
          cache-dependency-path: '**/packages.lock.json'
      - name: Restore Packages
        run: dotnet restore
      - name: Set Build Version
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          python3 - << 'PY'
          import os, glob, xml.etree.ElementTree as ET, re

          version = os.environ['VERSION']
          numeric_match = re.match(r"^(\d+\.\d+\.\d+)(?:-\w+\.(\d+))?", version)
          base_version = numeric_match.group(1)
          rev = numeric_match.group(2) or "0"
          assembly_version = f"{base_version}.{rev}"
          paths = [
              p for p in glob.glob("**/*.csproj", recursive=True)
              if ("bin" + os.sep not in p and "obj" + os.sep not in p)
          ]

          for path in paths:
              tree = ET.parse(path)
              root = tree.getroot()
          
              ns = ""
              if root.tag.startswith("{"):
                  ns = root.tag.split("}")[0] + "}"
          
              def find_or_create(parent, tag):
                  el = parent.find(f"{ns}{tag}")
                  if el is None:
                      el = ET.SubElement(parent, f"{ns}{tag}")
                  return el
          
              pg = root.find(f"{ns}PropertyGroup")
              if pg is None:
                  pg = ET.SubElement(root, f"{ns}PropertyGroup")
              find_or_create(pg, "Version").text = version
              find_or_create(pg, "InformationalVersion").text = version
              find_or_create(pg, "PackageVersion").text = version
              find_or_create(pg, "AssemblyVersion").text = assembly_version
              find_or_create(pg, "FileVersion").text = assembly_version

              tree.write(path, encoding="utf-8", xml_declaration=True)
              print(f"Stamped {path} with version {version}")
          PY
      - name: Build
        run: |
          dotnet publish gud/gud.csproj \
          --configuration Release \
          --runtime ${{ matrix.rid }} \
          --self-contained true \
          --output ./publish/${{ matrix.rid }}
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: int-${{ matrix.rid }}
          path: |
            ./publish/${{ matrix.rid }}/*
  package-linux:
    needs: [version, build]
    runs-on: ubuntu-latest
    name: Create Debian Package
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: int-linux-x64
          path: ./publish/linux-x64
      - name: Build Debian package
        run: |
          chmod +x ./scripts/generate-deb.sh
          DEBIAN_VERSION=$(echo "${{ needs.version.outputs.version }}" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+)-/\1~/')
          ./scripts/generate-deb.sh $DEBIAN_VERSION
      - name: Upload Debian Package
        uses: actions/upload-artifact@v4
        with:
          name: drop-linux-x64
          path: |
            *.deb
  publish-apt:
    name: Publish to APT
    needs: [package-linux, version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
      - name: Install reprepro
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro
      - name: Import GPG key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import
      - name: Download deb
        uses: actions/download-artifact@v4
        with:
          name: drop-linux-x64
          path: ./incoming
      - name: Add package to reprepro
        run: reprepro -b ./apt-repo includedeb unstable ./incoming/*.deb
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apt-repo
          git commit -m "chore: publish ${{ needs.version.outputs.version }} to apt (unstable)"
          git pull --rebase
          git push
  package-windows:
    name: Build Windows MSI
    runs-on: windows-latest
    needs: [version, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: int-win-x64
          path: ./publish/win-x64
      - name: Install wix and WixUI
        run: |
          dotnet tool install --global wix
          wix eula accept wix7
          wix extension add WixToolset.UI.wixext
      - name: Build Windows MSI
        run: |
          wix build installer/Product.wxs -d Version=${{ needs.version.outputs.version }} -d PublishDir=./publish/win-x64 -ext WixToolset.UI.wixext -o gud_${{needs.version.outputs.version}}.msi
      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: drop-win-x64
          path: |
            *.msi
  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.server == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: 'true'
          cache-dependency-path: '**/packages.lock.json'
      - name: Restore Packages
        run: dotnet restore
      - name: Build
        run: |
          dotnet publish gud.Server/gud.Server.csproj \
          --configuration Release \
          --self-contained true \
          --runtime linux-x64 \
          --output ./publish/server
  release:
    name: Publish Release
    needs: [version, package-linux, package-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: drop-*
          merge-multiple: true
          path: ./release-assets
      - name: Create Release ${{ needs.version.outputs.version }}
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./release-assets/**/*.msi
            ./release-assets/**/*.deb
          tag_name: ${{ needs.version.outputs.tag }}
          prerelease: true
          body: ${{ needs.version.outputs.notes }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}